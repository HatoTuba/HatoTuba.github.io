  # Projects (Ongoing Research)
  projects:
    enable: true
    title: "Ongoing Research"
    items:
      - title: Modeling the EPIC Dataset
        content: Applied a modified One-boundary DDM to the EPIC-Norfolk dataset (N=8623; ages 48–92) to examine the relationship between response time measures, demographic factors, and future dementia risk over a 10-year follow-up. Analyses combined cognitive modeling (simulation-based inference), survival analysis, and supervised machine learning.
        badges:
          - "Diffusion Modeling"
          - "BayesFlow"
          - "R"
          - "Python"

      - title: Time-Varying Parameters with EZ-Diffusion
        content: Applying EZ-Diffusion to investigate how model parameters change over time within an experiment, incorporating random walk priors in a JAGS model.
        badges:
          - "EZ-Diffusion"
          - "JAGS"
          - "R"

      - title: Modeling Large-Scale Cognitive Data from Lumosity
        content: Applying diffusion decision models to multiple reaction-time tasks using simulation-based inference (BayesFlow) to estimate latent decision parameters in large samples. Bayesian structural equation modeling planned to assess the stability and factor structure of DDM parameters across demographic subgroups.
        badges:
          - "DDM"
          - "BayesFlow"
          - "Bayesian SEM"


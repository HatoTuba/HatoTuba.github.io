  # About
  about:
    enable: true
    title: "About Me"
    image: "/images/me.png"
    content: |-
      I am a PhD candidate in Psychological Methods at Heidelberg University, supervised by Dr. Andreas Voss. My research focuses on Bayesian cognitive modeling, simulation-based inference, and the analysis of individual and intra-individual processes in large-scale behavioral data.

      I apply and develop diffusion models (Lévy Flight Model, one-boundary DDM, EZ-Diffusion) to understand decision-making and cognitive processes, working with datasets ranging from controlled laboratory experiments to large epidemiological cohorts.
    skills:
      enable: true
      title: "Skills & Tools:"
      items:
        - "Python (numpy, pandas, matplotlib, BayesFlow, scikit-learn)"
        - "R (tidyverse, ggplot2, Stan, JAGS)"
        - "Bayesian Statistics & MCMC"
        - "Cognitive Modeling (DDM, Lévy Flight, EZ-Diffusion)"
        - "Simulation-Based Inference"
        - "Git / GitHub"

